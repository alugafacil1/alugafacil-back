# ==========================================
# CONFIGURAÇÕES GERAIS
# ==========================================
spring.application.name=alugafacil
server.port=8081
server.address=0.0.0.0

spring.profiles.active=dev

# ==========================================
# CONFIGURAÇÃO DE CORS (FRONT-END)
# ==========================================
common.front=http://localhost:3000,http://localhost:8082,http://localhost:19000

# ==========================================
# BANCO DE DADOS
# ==========================================NN
spring.datasource.url=jdbc:postgresql://dpg-d6i5abi4d50c73fnqq00-a:5432/alugafacil
spring.datasource.username=postgres
spring.datasource.password=root

# Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true	
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.oauth2.jwt=DEBUG
logging.level.br.edu.ufape.alugafacil.config.JwtDebugFilter=INFO
logging.level.br.edu.ufape.alugafacil.services.KeycloakService=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# SEGURANÇA (KEYCLOAK)
# ==========================================
